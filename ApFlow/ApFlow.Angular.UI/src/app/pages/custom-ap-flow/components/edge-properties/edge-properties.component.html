<form nz-form [formGroup]="edgeForm" nzLayout="vertical">
    <nz-form-item>
        <nz-form-label nzRequired>边标签</nz-form-label>
        <nz-form-control nzErrorTip="请输入边标签">
            <input nz-input formControlName="label" placeholder="例如：同意、拒绝、下一步">
        </nz-form-control>
    </nz-form-item>

    <nz-form-item>
        <nz-form-label>条件类型</nz-form-label>
        <nz-form-control>
            <nz-select formControlName="conditionType" (ngModelChange)="onConditionTypeChange()">
                <nz-option nzValue="always" nzLabel="总是执行"></nz-option>
                <nz-option nzValue="expression" nzLabel="表达式条件"></nz-option>
                <nz-option nzValue="script" nzLabel="脚本条件"></nz-option>
            </nz-select>
        </nz-form-control>
    </nz-form-item>

    <nz-form-item *ngIf="edgeForm.get('conditionType')?.value === 'expression'">
        <nz-form-label nzRequired>条件表达式</nz-form-label>
        <nz-form-control nzErrorTip="请输入条件表达式">
            <input nz-input formControlName="condition" placeholder="例如：amount > 1000">
        </nz-form-control>
    </nz-form-item>

    <nz-form-item *ngIf="edgeForm.get('conditionType')?.value === 'script'">
        <nz-form-label nzRequired>条件脚本</nz-form-label>
        <nz-form-control nzErrorTip="请输入条件脚本">
            <textarea nz-input formControlName="expression" rows="4"
                placeholder="例如：return formData.amount > 1000;"></textarea>
        </nz-form-control>
    </nz-form-item>

    <nz-form-item>
        <nz-form-label>优先级</nz-form-label>
        <nz-form-control>
            <nz-input-number formControlName="priority" [nzMin]="1" [nzMax]="10"></nz-input-number>
            <div nz-typography nzType="secondary">数字越大优先级越高</div>
        </nz-form-control>
    </nz-form-item>
</form>
