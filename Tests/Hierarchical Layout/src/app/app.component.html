<div class="app-container">
  <header class="app-header">
    <h1>{{ title }}</h1>
    <p class="subtitle">基于 &#64;antv/x6 的垂直对齐流图解决方案</p>
  </header>
  
  <main class="app-main">
    @if (isLoading) {
      <div class="loading-overlay">
        <div class="loading-spinner"></div>
        <p>正在初始化流程图...</p>
      </div>
    }
    <app-flow-chart></app-flow-chart>
  </main>
  
  <footer class="app-footer">
    <div class="footer-content">
      <p>© 2023 X6 Angular Demo - 解决并行节点与合并节点垂直对齐问题</p>
      <p class="footer-links">
        <a href="https://x6.antv.antgroup.com/" target="_blank">&#64;antv/x6 文档</a>
        <span class="separator">|</span>
        <a href="https://angular.io/" target="_blank">Angular 文档</a>
      </p>
    </div>
  </footer>
</div>
