<nz-card class="or-merge-node" [nzBordered]="true">
  <div nz-row nzJustify="space-between" nzAlign="middle" class="node-header">
    <div nz-col>
      <span nz-icon nzType="fork" nzTheme="fill" style="color: #fff; margin-right: 4px;"></span>
      <span style="color: #fff; font-size: 12px; font-weight: 500;">或签合并节点</span>
    </div>
    <div nz-col>
      <button nz-button nzType="text" class="close-btn" (click)="close()">
        <span nz-icon nzType="close" nzTheme="outline"></span>
      </button>
    </div>
  </div>
  <div class="node-content">
    <div class="or-merge-info">
      <div class="or-merge-name">或签合并节点</div>
      <div class="or-merge-desc">合并或签分支</div>
    </div>
  </div>
</nz-card>
