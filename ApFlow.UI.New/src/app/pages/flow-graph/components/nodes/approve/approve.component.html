<nz-card class="approve-node" [nzBordered]="true">
  <div nz-row nzJustify="space-between" nzAlign="middle" class="node-header">
    <div nz-col>
      <span nz-icon nzType="check-circle" nzTheme="fill" style="color: #fff; margin-right: 4px;"></span>
      <span style="color: #fff; font-size: 12px; font-weight: 500;">审批节点</span>
    </div>
    <div nz-col>
      <button nz-button nzType="text" class="close-btn" (click)="close()">
        <span nz-icon nzType="close" nzTheme="outline"></span>
      </button>
    </div>
  </div>
  <div class="node-content">
    <div class="approver-info">
      <div class="approver-name">待设置审批人</div>
      <div class="approver-role">点击按钮选择</div>
    </div>
    <button nz-button nzType="primary" class="select-btn" (click)="setApprove()" nzBlock>
      <span nz-icon nzType="user-add" nzTheme="outline"></span>
      <span>选择审批人</span>
    </button>
  </div>
</nz-card>
