<nz-card class="or-node" [nzBordered]="true">
  <div nz-row nzJustify="space-between" nzAlign="middle" class="node-header">
    <div nz-col>
      <span nz-icon nzType="branches" nzTheme="outline" style="color: #fff; margin-right: 4px;"></span>
      <span style="color: #fff; font-size: 12px; font-weight: 500;">或签节点</span>
    </div>
    <div nz-col>
      <button nz-button nzType="text" class="close-btn" (click)="close()">
        <span nz-icon nzType="close" nzTheme="outline"></span>
      </button>
    </div>
  </div>
  <div class="node-content">
    <div class="or-info">
      <div class="or-name">或签节点</div>
      <div class="or-desc">任意一条分支通过即可</div>
    </div>
  </div>
</nz-card>
