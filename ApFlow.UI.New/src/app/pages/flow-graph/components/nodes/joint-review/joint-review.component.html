<nz-card class="joint-review-node" [nzBordered]="true">
  <div nz-row nzJustify="space-between" nzAlign="middle" class="node-header">
    <div nz-col>
      <span nz-icon nzType="team" nzTheme="fill" style="color: #fff; margin-right: 4px;"></span>
      <span style="color: #fff; font-size: 12px; font-weight: 500;">会审节点</span>
    </div>
    <div nz-col>
      <button nz-button nzType="text" class="close-btn" (click)="close()">
        <span nz-icon nzType="close" nzTheme="outline"></span>
      </button>
    </div>
  </div>
  <div class="node-content">
    <div class="review-info">
      <div class="review-name">会审节点</div>
      <div class="review-desc">多人共同审核</div>
    </div>
  </div>
</nz-card>
