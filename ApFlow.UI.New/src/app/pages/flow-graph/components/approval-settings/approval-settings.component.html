<nz-spin [nzSpinning]="loading">
  <div class="settings-container">
    <div class="form-item">
      <label class="form-label">审批人类型</label>
      <nz-select
        [(ngModel)]="approverType"
        (ngModelChange)="onApproverTypeChange()"
        style="width: 100%;"
      >
        <nz-option nzValue="user" nzLabel="指定人员"></nz-option>
        <nz-option nzValue="role" nzLabel="指定角色"></nz-option>
        <nz-option nzValue="leader" nzLabel="部门主管"></nz-option>
      </nz-select>
    </div>

    <div class="form-item" *ngIf="approverType === 'user'">
      <label class="form-label">选择人员</label>
      <nz-select
        nzMode="multiple"
        [(ngModel)]="selectedUsers"
        nzPlaceHolder="请选择审批人员"
        [nzShowSearch]="true"
        style="width: 100%;"
      >
        <nz-option *ngFor="let user of userList" [nzValue]="user.id" [nzLabel]="user.name"></nz-option>
      </nz-select>
    </div>

    <div class="form-item" *ngIf="approverType === 'role'">
      <label class="form-label">选择角色</label>
      <nz-select
        nzMode="multiple"
        [(ngModel)]="selectedRoles"
        nzPlaceHolder="请选择角色"
        style="width: 100%;"
      >
        <nz-option *ngFor="let role of roleList" [nzValue]="role.id" [nzLabel]="role.name"></nz-option>
      </nz-select>
    </div>

    <div class="form-item" *ngIf="approverType === 'leader'">
      <label class="form-label">主管层级</label>
      <nz-select [(ngModel)]="leaderLevel" style="width: 100%;">
        <nz-option nzValue="1" nzLabel="直属主管"></nz-option>
        <nz-option nzValue="2" nzLabel="第二级主管"></nz-option>
        <nz-option nzValue="3" nzLabel="第三级主管"></nz-option>
      </nz-select>
    </div>

    <div class="form-item">
      <label class="form-label">审批方式</label>
      <nz-radio-group [(ngModel)]="approvalMode">
        <label nz-radio nzValue="or">或签（一人通过即可）</label>
        <label nz-radio nzValue="and">会签（需所有人通过）</label>
      </nz-radio-group>
    </div>

    <div class="form-item">
      <label class="form-label">审批设置</label>
      <label nz-checkbox [(ngModel)]="autoApprove">自动通过（发起人本人审批）</label>
    </div>
  </div>

  <div class="footer-actions">
    <button nz-button nzType="default" (click)="cancel()">取消</button>
    <button nz-button nzType="primary" (click)="confirm()">确定</button>
  </div>
</nz-spin>
